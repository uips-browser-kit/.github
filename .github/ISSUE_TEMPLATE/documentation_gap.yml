name: Documentation Gap
description: "Something is missing, wrong, or unclear in the docs"
title: "[Docs] "
labels: ["documentation"]
body:
  - type: textarea
    id: what
    attributes:
      label: What is missing or wrong
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Where it should live
      placeholder: "e.g. docs/contributing.md, library README"
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Who is affected
    validations:
      required: true
