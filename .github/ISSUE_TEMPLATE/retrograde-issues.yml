# Retrograde issues for the org repo — represents work already completed.
# Run org/tmp/retrograde-issues.py to create and close these in GitHub.
#
# Fields:
#   title         — issue title
#   labels        — list of label names (must exist in the repo)
#   body          — issue body (markdown)
#   close_comment — posted as a comment before closing

repo: uips-browser-kit/org

issues:

  # ---------------------------------------------------------------------------
  # Epic: Set up organization-wide infrastructure and governance standards
  # ---------------------------------------------------------------------------

  - title: "Bootstrap declarative org provisioner (provision_org.py + uips-browser-kit.yml)"
    labels: [enhancement]
    body: |
      ## Problem

      The uips-browser-kit org has no automated way to set up or reproduce its
      configuration. Every repo, team, ruleset, and label is created manually,
      making the state inconsistent and hard to recreate after destructive changes.

      ## Proposed solution

      Write a Python provisioner (`provision_org.py`) that reads a single declarative
      YAML file (`uips-browser-kit.yml`) and reconciles live org state with desired
      state via the `gh` CLI. The provisioner must be idempotent — running it twice
      produces no changes the second time.

      ## Acceptance criteria

      - [ ] `provision_org.py` accepts `--config`, `--dry-run`, and `--only <sections>` flags
      - [ ] `uips-browser-kit.yml` defines org settings, repos, teams, secrets, and projects
      - [ ] Defaults block with deep merge avoids repetition across repos
      - [ ] Tier gating skips sections not available on the free plan
      - [ ] A clean run prints only `[ok]` and `[skip]` lines
    close_comment: >
      Implemented in initial provisioner commit.
      `provision_org.py` and `uips-browser-kit.yml` are live in this repo.

  - title: "Define repo structure, seed standard files, and configure org-wide defaults"
    labels: [enhancement]
    body: |
      ## Problem

      Repos in the org are created with inconsistent settings, labels, topics, and
      merge strategies. There is no single source of truth for what a repo should
      look like.

      ## Proposed solution

      Define all repos in `uips-browser-kit.yml` with a shared `defaults.repository`
      block. Seed each repo with standard labels, CODEOWNERS, rulesets, and topics.
      Delete GitHub's default labels and replace with a consistent, project-specific set.

      ## Acceptance criteria

      - [ ] `defaults.repository` covers features, merge strategy, security settings
      - [ ] Custom label set: workflow, status, and scope-phase categories
      - [ ] `delete_default_labels: true` removes GitHub's built-in labels on every repo
      - [ ] CODEOWNERS seeded to repos that need review enforcement
      - [ ] All active and infra repos defined: `.github`, `.github-private`, `discussions`,
            `org`, `uips-browser-kit.github.io`, `library`, `rules`, `snippets`,
            `testproject`, `testdata`, `docs`, `testharness-webapps`, `playground`, `exploration`
    close_comment: >
      All repos, labels, CODEOWNERS, and defaults provisioned via `uips-browser-kit.yml`.

  - title: "Configure teams and repo access grants"
    labels: [enhancement]
    body: |
      ## Problem

      Access to repos is granted ad hoc per user. There are no teams to manage
      permissions at scale, and the relationship between roles and repos is undocumented.

      ## Proposed solution

      Define five teams in `uips-browser-kit.yml`: `owners`, `maintainers`,
      `contributors`, `docs`, `triage`. Each team has a description, privacy setting,
      and a list of repos with the appropriate permission level.

      ## Acceptance criteria

      - [ ] `owners` — admin on all repos including private repos
      - [ ] `maintainers` — admin on all repos
      - [ ] `contributors` — push on active development repos
      - [ ] `docs` — push on `docs` and `uips-browser-kit.github.io`
      - [ ] `triage` — triage on active repos and `discussions`
      - [ ] All teams are closed (not secret)
    close_comment: >
      Five teams defined and provisioned. Grants applied to all repos.

  - title: "Add branch and tag rulesets for public repos"
    labels: [enhancement]
    body: |
      ## Problem

      There are no branch protections on `main` or version tags. Contributors can
      push directly to `main` or create arbitrary tags without review.

      ## Proposed solution

      Add two rulesets per public repo: `Protect default branch` (require PR + CLA
      status check, block force push, require linear history) and `Protect version
      tags` (immutable `v*.*.*` tags). Org admins bypass with `bypass_mode: always`.

      ## Acceptance criteria

      - [ ] `Protect default branch`: required PR reviews, CLA status check, no force push, linear history
      - [ ] `Protect version tags`: pattern `v*.*.*`, immutable
      - [ ] Bypass actors: org admin built-in role (`actor_id: null, actor_type: OrganizationAdmin`)
      - [ ] Rulesets skipped on private repos (free plan); logged as `[skip]`
      - [ ] Applied to `library`, `rules`, `snippets`
    close_comment: >
      Rulesets provisioned for all public repos.
      Private repos skipped with tier gate.

  - title: "Add uips-browser-kit.github.io as the org Pages repo"
    labels: [enhancement]
    body: |
      ## Problem

      The org has no public website and no place to publish the org health dashboard.

      ## Proposed solution

      Add a `uips-browser-kit.github.io` repo to the YAML with `build_type: workflow`
      (not the legacy Jekyll-from-branch approach). Enable Pages via the provisioner.

      ## Acceptance criteria

      - [ ] Repo created: public, issues enabled, no wiki or discussions
      - [ ] `pages.build_type: workflow` — no Jekyll source branch
      - [ ] `members_can_create_pages: true` set in org settings (required for Pages API)
      - [ ] `docs` team: push; `maintainers` / `owners` teams: admin
    close_comment: >
      Repo provisioned with `build_type: workflow`.
      Org setting `members_can_create_pages: true` applied.

  # ---------------------------------------------------------------------------
  # Epic: Establish contributor onboarding and compliance processes
  # ---------------------------------------------------------------------------

  - title: "Seed CLA enforcement workflow to library, rules, and snippets"
    labels: [enhancement, documentation]
    body: |
      ## Problem

      There is no contributor license agreement process. External contributors can
      submit PRs without agreeing to the CLA, creating a legal gap for shipped packages.

      ## Proposed solution

      Seed `.github/workflows/cla.yml` (using `contributor-assistant/github-action`)
      into `library`, `rules`, and `snippets`. The workflow requires a `CLA_PAT` org
      secret and stores signatures on a `cla-signatures` branch.

      ## Acceptance criteria

      - [ ] `cla.yml` seeded via provisioner to `library`, `rules`, `snippets`
      - [ ] `CLA_PAT` org secret defined in YAML and registered in GitHub
      - [ ] CLA document at `https://github.com/uips-browser-kit/.github/blob/main/CLA.md`
      - [ ] Org admins have `bypass_mode: always` in the ruleset
      - [ ] RUNBOOK documents bootstrap: open a test PR to verify the check appears
    close_comment: >
      CLA workflow seeded. `CLA_PAT` registered. RUNBOOK bootstrap steps written.

  - title: "Add org-wide GitHub Issue Form templates to .github"
    labels: [enhancement, documentation]
    body: |
      ## Problem

      Issues across the org have no consistent structure. There are no templates to
      guide contributors when reporting bugs, proposing scope, or sharing research.

      ## Proposed solution

      Seed five Issue Form templates into the `.github` repo so they apply org-wide:

      1. `bug-report.yml` — structured bug report
      2. `scope-input.yml` — pain point or scope proposal
      3. `feature-request.yml` — feature proposal with motivation
      4. `research.yml` — research findings with method and open questions
      5. `task.yml` — internal task with objective and definition of done

      ## Acceptance criteria

      - [ ] All five templates use the modern YAML form format
      - [ ] Each template pre-assigns appropriate labels
      - [ ] `config.yml` sets `blank_issues_enabled: false` and links to Discussions
      - [ ] Templates seeded via provisioner (YAML multiline block in `uips-browser-kit.yml`)
    close_comment: >
      All five Issue Form templates seeded to `.github` repo.

  # ---------------------------------------------------------------------------
  # Epic: Strengthen provisioning workflow robustness and error handling
  # ---------------------------------------------------------------------------

  - title: "Register org secret names as placeholders when env vars are unset"
    labels: [enhancement, bug]
    body: |
      ## Problem

      When `--only org_secrets` runs without any env vars exported, all secrets are
      silently skipped. The GitHub UI stays empty with no indication of which secrets
      are expected.

      ## Proposed solution

      If a secret's env var is unset and the secret doesn't yet exist, create it with
      value `__unset__`. If the secret already exists, skip without overwriting.

      ## Acceptance criteria

      - [ ] New secret + unset env var → created with `__unset__`, logged as `[ok] [placeholder]`
      - [ ] Existing secret + unset env var → skipped with "export $VAR to update"
      - [ ] Existing secret + env var set → updated with real value
      - [ ] All 6 secret names visible in GitHub UI after first run with no env vars exported
    close_comment: >
      Placeholder logic implemented in `org_secrets()`.
      All 6 secret names now registered on first run.

  - title: "Support SSH private keys via file-path reference (from_env_file)"
    labels: [enhancement]
    body: |
      ## Problem

      The `ORG_PAGES_DEPLOY_KEY` secret holds a multiline SSH private key. Setting a
      multiline value in an env var or `.env` file is error-prone on Windows.

      ## Proposed solution

      Add `from_env_file` as an alternative to `from_env`. The env var holds a file
      path; the provisioner reads the file contents at runtime. The private key never
      appears in `.env` or any shell variable.

      ## Acceptance criteria

      - [ ] `from_env_file: VAR` supported in `org_secrets` alongside `from_env: VAR`
      - [ ] Provisioner reads file at path given by the env var via `pathlib.Path.read_text`
      - [ ] Unreadable file logs a `[skip]` with the OSError message
      - [ ] Works on Windows with backslash and forward-slash paths
      - [ ] `ORG_PAGES_DEPLOY_KEY` updated to use `from_env_file: ORG_PAGES_DEPLOY_KEY_FILE`
      - [ ] `.env.example` and RUNBOOK updated
    close_comment: >
      Implemented `_read_env_file()` and `from_env_file` support.
      `ORG_PAGES_DEPLOY_KEY` now uses it.

  - title: "Auto-load .env file at provisioner startup"
    labels: [enhancement]
    body: |
      ## Problem

      Setting values in `.env` has no effect unless the user manually sources the
      file or exports each variable. A user edits `.env`, runs the provisioner, and
      sees all secrets skipped — with no explanation.

      ## Proposed solution

      At startup, load `.env` from the same directory as the config file. Apply only
      variables not already set in the environment. Print which variables were loaded.

      ## Acceptance criteria

      - [ ] `_load_dotenv(config_path)` called early in `main()` before any section runs
      - [ ] Parses `KEY=VALUE` lines; skips comments and blanks
      - [ ] Existing environment variables are not overridden
      - [ ] Prints `[env] loaded from .env: VAR1, VAR2` for loaded variables
      - [ ] Silently succeeds when `.env` is absent
    close_comment: >
      Implemented `_load_dotenv()`. Provisioner now prints loaded vars at startup.

  - title: "Fix secret name GH_PACKAGES_TOKEN (GITHUB_* prefix reserved by GitHub)"
    labels: [bug]
    body: |
      ## Problem

      The org secret was named `GITHUB_PACKAGES_TOKEN`. GitHub rejects any secret
      name starting with `GITHUB_` with HTTP 422.

      ## Proposed solution

      Rename to `GH_PACKAGES_TOKEN` throughout: YAML config, `.env.example`, RUNBOOK.

      ## Acceptance criteria

      - [ ] Renamed in `uips-browser-kit.yml`
      - [ ] `.env.example` updated
      - [ ] RUNBOOK token inventory updated
      - [ ] No remaining references to `GITHUB_PACKAGES_TOKEN` in the org repo
    close_comment: >
      Renamed to `GH_PACKAGES_TOKEN` across YAML, .env.example, and RUNBOOK.

  # ---------------------------------------------------------------------------
  # Epic: Create project planning and release tracking framework
  # ---------------------------------------------------------------------------

  - title: "Create Browser Kit Roadmap GitHub Project with custom fields and status options"
    labels: [enhancement]
    body: |
      ## Problem

      There is no shared view of what work is planned or in progress across repos.
      Issues and milestones are siloed per repository.

      ## Proposed solution

      Create a public GitHub Project (Projects v2) named "Browser Kit Roadmap" via
      the provisioner using the GraphQL API. Define custom status options and a
      `Release` single-select field.

      ## Acceptance criteria

      - [ ] Project defined under `org_projects` in `uips-browser-kit.yml`
      - [ ] Provisioner creates project if absent (GraphQL `createProjectV2`)
      - [ ] Status options: Todo, In Progress, In Review, Done
      - [ ] `Release` field: v0.1, v0.2, Backlog
      - [ ] Project is public; views noted in YAML (no public API, UI-only)
    close_comment: >
      Project created. Status options and Release field provisioned via GraphQL.

  - title: "Add per-repo milestones to declarative YAML config"
    labels: [enhancement]
    body: |
      ## Problem

      Milestones are created manually and drift out of sync across repos.

      ## Proposed solution

      Add a `milestones` list to each repo in `uips-browser-kit.yml`. The provisioner
      creates milestones if absent and updates them if they drift.

      ## Acceptance criteria

      - [ ] `milestones` key supported under each repo in the YAML
      - [ ] `_ensure_milestones()` creates missing milestones via REST API
      - [ ] Existing milestones updated if description or due_on changed
      - [ ] Initial: `org` → `bootstrap`; `testharness-webapps` → `v0.1`
    close_comment: >
      Milestones implemented. `bootstrap` in `org`; `v0.1` in `testharness-webapps`.

  # ---------------------------------------------------------------------------
  # Epic: Add repository and organization health monitoring capabilities
  # ---------------------------------------------------------------------------

  - title: "Implement snapshot_org.py for point-in-time org state capture"
    labels: [enhancement]
    body: |
      ## Problem

      There is no way to capture the current state of the org as a baseline or audit
      trail. After provisioning, drift is invisible until something breaks.

      ## Proposed solution

      Write `snapshot_org.py` — a read-only script that writes a single JSON file
      containing org settings, members, teams, repos (with settings/labels/rulesets),
      and org-level secrets/variables.

      ## Acceptance criteria

      - [ ] `python snapshot_org.py --org uips-browser-kit` writes `snapshot-<org>-<ts>.json`
      - [ ] `--out -` streams to stdout for piping
      - [ ] Paginates all list endpoints
      - [ ] CODEOWNERS decoded from base64 and stored as plaintext
      - [ ] `snapshot-*.json` in `.gitignore`
    close_comment: >
      Implemented. Snapshot written to `snapshot-uips-browser-kit-<ts>.json`.

  - title: "Extend snapshot with per-repo health metrics"
    labels: [enhancement]
    body: |
      ## Problem

      The initial snapshot captures configuration but nothing about repo health —
      open PRs, issue backlog, contributor activity, community profile completeness.

      ## Proposed solution

      Add a `health` block to each repo in the snapshot: branches with protection
      status, open PRs, open issues with label counts, contributors, milestones,
      recent releases, and community health percentage.

      ## Acceptance criteria

      - [ ] `collect_repo_health()` called for every repo
      - [ ] `open_prs`: number, title, author, created_at, draft flag
      - [ ] `issues`: open_count, oldest_created_at, label_counts
      - [ ] `contributors`: login and contribution count
      - [ ] `milestones`: title, state, due_on, open/closed counts
      - [ ] `releases`: last 5 with tag, published_at, prerelease flag
      - [ ] `community_health`: health_percentage and files present/absent map
    close_comment: >
      Implemented in `collect_repo_health()`. All health metrics in snapshot.

  - title: "Include org Projects data in snapshot output"
    labels: [enhancement]
    body: |
      ## Problem

      `snapshot_org.py` misses GitHub Projects v2 (requires GraphQL). The roadmap
      project state is invisible in the snapshot.

      ## Proposed solution

      Add `collect_org_projects()` using GraphQL: title, description, public flag,
      item count, fields with options, and views. Attach discussion categories to
      repos with discussions enabled.

      ## Acceptance criteria

      - [ ] `org_projects` top-level key in snapshot JSON
      - [ ] Each project: number, title, short_description, public, item_count, fields, views
      - [ ] Single-select fields include options with name and color
      - [ ] Discussion categories fetched for repos with `has_discussions: true`
      - [ ] GraphQL errors printed as `[warn]`, non-fatal
    close_comment: >
      Implemented in `collect_org_projects()` with discussion categories per repo.

  # ---------------------------------------------------------------------------
  # Epic: Standardize tooling, documentation, and repository structure
  # ---------------------------------------------------------------------------

  - title: "Write provisioning RUNBOOK with PAT management and deploy key instructions"
    labels: [documentation]
    body: |
      ## Problem

      There is no documentation on how to operate the provisioner: which tokens are
      needed, what scopes they require, or what steps GitHub's API cannot automate.

      ## Proposed solution

      Write `RUNBOOK.md` covering: prerequisites, PAT inventory table (all secrets
      with type, permissions, visibility), step-by-step PAT creation for each
      fine-grained token, deploy key alternative, and manual UI steps.

      ## Acceptance criteria

      - [ ] Token inventory table: all 6 secrets with source, type, permissions
      - [ ] `ORG_SNAPSHOT_TOKEN`: fine-grained, read-only org-wide, exact permission list
      - [ ] `ORG_PAGES_PUSH_TOKEN`: fine-grained, Contents:write on `.github.io` only
      - [ ] Deploy key section: generate → add public key to repo → store via `from_env_file`
      - [ ] Manual steps: 2FA, member privileges, deploy keys toggle, Discussions categories
    close_comment: >
      RUNBOOK written with full PAT inventory, fine-grained PAT instructions,
      and deploy key steps.

  - title: "Document all org secrets in .env.example with setup instructions"
    labels: [documentation]
    body: |
      ## Problem

      There is no reference file showing which environment variables the provisioner
      reads. A new operator has no starting point for setting up credentials.

      ## Proposed solution

      Create `.env.example` listing all 6 secret source variables with inline
      comments, a full PowerShell setup block, and mutual-exclusion notes for
      `ORG_PAGES_PUSH_TOKEN` vs `ORG_PAGES_DEPLOY_KEY_FILE`.

      ## Acceptance criteria

      - [ ] All 6 variables listed with type and scope comments
      - [ ] PowerShell setup block shows all variables with example value shapes
      - [ ] Fine-grained PAT entries note exact resource owner and permissions
      - [ ] `ORG_PAGES_DEPLOY_KEY_FILE` explains it holds a file path, not key contents
      - [ ] `.env` in `.gitignore`
    close_comment: >
      `.env.example` written with all variables, PowerShell setup, and permission details.
